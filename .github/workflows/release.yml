name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Run tests
        run: cargo test

      - name: Build WASM (bundler)
        run: wasm-pack build --target bundler --out-dir pkg-bundler

      - name: Build WASM (web)
        run: wasm-pack build --target web --out-dir pkg-web

      - name: Build WASM (nodejs)
        run: wasm-pack build --target nodejs --out-dir pkg-node

      - name: Package artifacts
        run: |
          tar -czf vazi-ranker-bundler-${{ github.ref_name }}.tar.gz pkg-bundler/
          tar -czf vazi-ranker-web-${{ github.ref_name }}.tar.gz pkg-web/
          tar -czf vazi-ranker-node-${{ github.ref_name }}.tar.gz pkg-node/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            vazi-ranker-bundler-${{ github.ref_name }}.tar.gz
            vazi-ranker-web-${{ github.ref_name }}.tar.gz
            vazi-ranker-node-${{ github.ref_name }}.tar.gz
